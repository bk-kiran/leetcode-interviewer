# Not currently used — judge0_client.py talks to the hosted RapidAPI Judge0 CE
# endpoint (see .env: JUDGE0_URL/JUDGE0_API_KEY). Kept for local self-hosting
# if you want to switch back (self-hosted Judge0's isolate sandbox needs a
# host with cgroup v1/hybrid — it doesn't run under Docker Desktop's cgroup
# v2-only VM on Mac/Windows).
x-logging:
  &default-logging
  logging:
    driver: json-file
    options:
      max-size: 100M

services:
  server:
    image: judge0/judge0:1.13.1
    volumes:
      - ./judge0.conf:/judge0.conf:ro
    ports:
      - "2358:2358"
    privileged: true
    <<: *default-logging
    restart: always

  worker:
    image: judge0/judge0:1.13.1
    command: ["./scripts/workers"]
    volumes:
      - ./judge0.conf:/judge0.conf:ro
    privileged: true
    <<: *default-logging
    restart: always

  db:
    image: postgres:16.2
    env_file: judge0.conf
    volumes:
      - judge0-db:/var/lib/postgresql/data/
    <<: *default-logging
    restart: always

  redis:
    image: redis:7.2.4
    command: [
      "bash", "-c",
      'docker-entrypoint.sh --appendonly no --requirepass "$$REDIS_PASSWORD"'
    ]
    env_file: judge0.conf
    <<: *default-logging
    restart: always

volumes:
  judge0-db:
