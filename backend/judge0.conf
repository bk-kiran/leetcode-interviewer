################################################################################
# Judge0 Configuration File (local dev)
################################################################################
# Trimmed-down copy of the official judge0.conf (https://github.com/judge0/judge0)
# with just the local-dev-required values set. All other options fall back to
# Judge0's defaults. See the upstream file for full documentation of each key.


################################################################################
# Judge0 Server Configuration
################################################################################
JUDGE0_TELEMETRY_ENABLE=false
RESTART_MAX_TRIES=10
MAINTENANCE_MODE=false
ENABLE_WAIT_RESULT=true
ENABLE_COMPILER_OPTIONS=true
ENABLE_COMMAND_LINE_ARGUMENTS=true
ENABLE_SUBMISSION_DELETE=false
ENABLE_BATCHED_SUBMISSIONS=true
MAX_SUBMISSION_BATCH_SIZE=20
ENABLE_CALLBACKS=true
ENABLE_ADDITIONAL_FILES=true
SUBMISSION_CACHE_DURATION=0
USE_DOCS_AS_HOMEPAGE=false


################################################################################
# Judge0 Workers Configuration
################################################################################
INTERVAL=0.1
MAX_QUEUE_SIZE=100


################################################################################
# Judge0 Server Access Configuration
################################################################################
# Local dev only - Judge0 is bound to localhost:2358 and not exposed publicly,
# so no auth/allow-list is configured here.
ALLOW_ORIGIN=
AUTHN_TOKEN=
AUTHZ_TOKEN=


################################################################################
# Redis Configuration
################################################################################
REDIS_HOST=redis
REDIS_PORT=6379
REDIS_PASSWORD=judge0_dev_redis_pw


################################################################################
# PostgreSQL Configuration
################################################################################
POSTGRES_HOST=db
POSTGRES_PORT=5432
POSTGRES_DB=judge0
POSTGRES_USER=judge0
POSTGRES_PASSWORD=judge0_dev_db_pw


################################################################################
# Submission Configuration
################################################################################
CPU_TIME_LIMIT=5
MAX_CPU_TIME_LIMIT=15
CPU_EXTRA_TIME=1
WALL_TIME_LIMIT=10
MAX_WALL_TIME_LIMIT=20
MEMORY_LIMIT=128000
MAX_MEMORY_LIMIT=512000
ENABLE_NETWORK=false


################################################################################
# Rails Configuration
################################################################################
RAILS_ENV=production
SECRET_KEY_BASE=judge0_dev_secret_key_base_change_me
